{% extends 'base.html' %} {% block title %}Post New Vacancy{% endblock %} 
{% block content %}
    <h1>Post a New Job Vacancy</h1>

    <form method="post" style="max-width: 600px">
    {% csrf_token %}

    <div style="margin-bottom: 15px">
        <label
        for="author"
        style="display: block; margin-bottom: 5px; font-weight: bold"
        >Posted by:</label
        >
        <select
        name="author"
        id="author"
        required
        style="
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        "
        >
        <option value="">Select the poster...</option>
        {% for user in users %}
        <option value="{{ user.id }}">{{ user.name }} ({{ user.email }})</option>
        {% endfor %}
        </select>
    </div>

    <div style="margin-bottom: 15px">
        <label
        for="title"
        style="display: block; margin-bottom: 5px; font-weight: bold"
        >Job Title:</label
        >
        <input
        type="text"
        name="title"
        id="title"
        required
        maxlength="100"
        style="
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        "
        />
    </div>

    <div style="margin-bottom: 15px">
        <label
        for="salary"
        style="display: block; margin-bottom: 5px; font-weight: bold"
        >Salary ($):</label
        >
        <input
        type="number"
        name="salary"
        id="salary"
        min="1"
        max="99999"
        required
        style="
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        "
        />
    </div>

    <div style="margin-bottom: 15px">
        <label
        for="description"
        style="display: block; margin-bottom: 5px; font-weight: bold"
        >Job Description:</label
        >
        <textarea
        name="description"
        id="description"
        rows="6"
        style="
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
        "
        ></textarea>
    </div>

    <button
        type="submit"
        style="
        background-color: #28a745;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        "
    >
        Post Vacancy
    </button>
    <a
        href="{% url 'vacancies' %}"
        style="margin-left: 10px; color: #6c757d; text-decoration: none"
        >Cancel</a
    >
    </form>
{% endblock %}
